name: Commit Message Lint

on:
  pull_request:
    branches: [main]

jobs:
  commit-lint:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit message format
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          pattern='^(feat|fix|docs|style|refactor|test|chore|ci|build)(\(.+\))?(!)?: .{1,72}$'
          warnings=0

          for sha in $(git rev-list "$base".."$head"); do
            subject=$(git log -1 --format='%s' "$sha")
            if ! echo "$subject" | grep -qE "$pattern"; then
              echo "::warning::Commit $sha has non-conventional message: '$subject'"
              echo "  Expected format: <type>(<scope>): <description>"
              echo "  Types: feat, fix, docs, style, refactor, test, chore, ci, build"
              echo "  Example: feat(agent): add rolling update strategy"
              warnings=$((warnings + 1))
            fi
          done

          if [ "$warnings" -gt 0 ]; then
            echo ""
            echo "$warnings commit(s) don't follow conventional commit format."
            echo "See: https://www.conventionalcommits.org/en/v1.0.0/"
            echo ""
            echo "This is a WARNING — the PR is not blocked."
            # To make this check blocking, uncomment the next line:
            # exit 1
          else
            echo "All commits follow conventional commit format."
          fi
